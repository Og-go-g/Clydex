version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: clydex-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clydex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clydex_secret}
      POSTGRES_DB: clydex_main
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clydex -d clydex_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: clydex-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: clydex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  pgdata:
