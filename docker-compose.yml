services:
  app:
    build: .
    container_name: clydex-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: clydex-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  worker:
    build:
      context: .
      target: worker
    container_name: clydex-worker
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').statSync('/tmp/worker.healthy')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - app
